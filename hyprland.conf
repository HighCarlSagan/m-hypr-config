exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = blueman-applet

################
### MONITORS ###
################
# Monitor configuration
# Primary monitor - Samsung on DisplayPort (DP-3) - positioned on LEFT
monitor=DP-3,preferred,0x0,1

# Secondary monitor - BenQ on HDMI - positioned to RIGHT of Samsung
monitor=HDMI-A-1,1920x1080@60,2560x0,1

# Fallback
monitor=,preferred,auto,1

# Workspace assignments - Samsung (DP-3) gets workspaces 1-9
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3
workspace = 6, monitor:DP-3
workspace = 7, monitor:DP-3
workspace = 8, monitor:DP-3
workspace = 9, monitor:DP-3


# BenQ (HDMI-A-1) gets workspaces 11-19
workspace = 11, monitor:HDMI-A-1, default:true
workspace = 12, monitor:HDMI-A-1
workspace = 13, monitor:HDMI-A-1
workspace = 14, monitor:HDMI-A-1
workspace = 15, monitor:HDMI-A-1
workspace = 16, monitor:HDMI-A-1
workspace = 17, monitor:HDMI-A-1
workspace = 18, monitor:HDMI-A-1
workspace = 19, monitor:HDMI-A-1

###################
### KEYBINDINGS ###
###################

# Music visualizer
bind = SUPER, M, exec, kitty --class floating-cava -e cava

# Applications
bind = SUPER, Return, exec, kitty
bind = SUPER, D, exec, rofi -show drun
bind = SUPER, E, exec, dolphin
bind = SUPER, B, exec, firefox

# Window Management
bind = SUPER, Q, killactive
bind = SUPER SHIFT, Q, exit
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating
bind = SUPER, T, togglesplit

# Focus (Arrow keys)
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move Windows (Arrow keys)
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Resize Windows (Arrow keys)
bind = SUPER CTRL, left, resizeactive, -40 0
bind = SUPER CTRL, right, resizeactive, 40 0
bind = SUPER CTRL, up, resizeactive, 0 -40
bind = SUPER CTRL, down, resizeactive, 0 40

# Alt+Tab window switching
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
bind = ALT SHIFT, Tab, cyclenext, prev

# Workspaces - Primary Monitor Samsung/DP-3 (1-9)
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Workspaces - Secondary Monitor BenQ/HDMI (11-19)
bind = ALT, 1, workspace, 11
bind = ALT, 2, workspace, 12
bind = ALT, 3, workspace, 13
bind = ALT, 4, workspace, 14
bind = ALT, 5, workspace, 15
bind = ALT, 6, workspace, 16
bind = ALT, 7, workspace, 17
bind = ALT, 8, workspace, 18
bind = ALT, 9, workspace, 19

# Move to Workspace - Primary Monitor
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# Move to Workspace - Secondary Monitor
bind = ALT SHIFT, 1, movetoworkspace, 11
bind = ALT SHIFT, 2, movetoworkspace, 12
bind = ALT SHIFT, 3, movetoworkspace, 13
bind = ALT SHIFT, 4, movetoworkspace, 14
bind = ALT SHIFT, 5, movetoworkspace, 15
bind = ALT SHIFT, 6, movetoworkspace, 16
bind = ALT SHIFT, 7, movetoworkspace, 17
bind = ALT SHIFT, 8, movetoworkspace, 18
bind = ALT SHIFT, 9, movetoworkspace, 19

# Cross-monitor movement (move from primary to secondary)
bind = SUPER CTRL, 1, movetoworkspace, 11
bind = SUPER CTRL, 2, movetoworkspace, 12
bind = SUPER CTRL, 3, movetoworkspace, 13
bind = SUPER CTRL, 4, movetoworkspace, 14
bind = SUPER CTRL, 5, movetoworkspace, 15
bind = SUPER CTRL, 6, movetoworkspace, 16
bind = SUPER CTRL, 7, movetoworkspace, 17
bind = SUPER CTRL, 8, movetoworkspace, 18
bind = SUPER CTRL, 9, movetoworkspace, 19

# Cross-monitor movement (move from secondary to primary)
bind = ALT CTRL, 1, movetoworkspace, 1
bind = ALT CTRL, 2, movetoworkspace, 2
bind = ALT CTRL, 3, movetoworkspace, 3
bind = ALT CTRL, 4, movetoworkspace, 4
bind = ALT CTRL, 5, movetoworkspace, 5
bind = ALT CTRL, 6, movetoworkspace, 6
bind = ALT CTRL, 7, movetoworkspace, 7
bind = ALT CTRL, 8, movetoworkspace, 8
bind = ALT CTRL, 9, movetoworkspace, 9

# Monitor focus and movement
bind = SUPER, M, focusmonitor, +1
bind = SUPER SHIFT, M, movewindow, mon:+1

# Workspace Navigation
bind = SUPER, TAB, workspace, e+1
bind = SUPER SHIFT, TAB, workspace, e-1
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Screenshots
bind = , Print, exec, hyprshot -m region --clipboard-only
bind = SHIFT, Print, exec, hyprshot -m output --clipboard-only
bind = CTRL, Print, exec, hyprshot -m window --clipboard-only
bind = ALT, Print, exec, sleep 3 && hyprshot -m output --clipboard-only

# System
bind = SUPER, ESCAPE, exec, hyprlock
bind = SUPER, W, exec, killall waybar || waybar

# Mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = SUPER, Delete, exec, ~/.config/rofi/powermenu.sh

#################
### AUTOSTART ###
#################

exec-once=waybar
exec-once=swww-daemon
exec-once=swww img /home/carl/Pictures/Wallpapers/cyberpunk.jpg

# Ensure primary monitor (Samsung DP-3) is focused first
exec-once = hyprctl dispatch focusmonitor DP-3

# Workspace 1: Firefox & Terminal on Samsung
exec-once = [workspace 1 silent] firefox
exec-once = [workspace 1 silent] kitty

# Workspace 2: Brave on Samsung
exec-once = [workspace 2 silent] brave

# Workspace 3: Spotify, Telegram, WhatsApp on Samsung
exec-once = [workspace 3 silent] spotify
exec-once = [workspace 3 silent] telegram
exec-once = [workspace 3 silent] wasistlos

# Set workspace 1 active on boot on Samsung
exec-once = hyprctl dispatch workspace 1

# Ensure secondary monitor (BenQ HDMI) starts on empty workspace 11
exec-once = sleep 2 && hyprctl dispatch focusmonitor HDMI-A-1 && hyprctl dispatch workspace 11 && hyprctl dispatch focusmonitor DP-3

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
exec-once=hyprctl setcursor hypr-dots-anonymous 24
exec-once=gsettings set org.gnome.desktop.interface cursor-theme 'hypr-dots-anonymous' &> /dev/null

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 10
    gaps_out = 40
    border_size = 3
    col.active_border = rgba(EF3946ff) rgba(EF3946ff) 45deg
    col.inactive_border = rgba(00000000)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.9
    inactive_opacity = 0.3
    
    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(EF3946ff)
        color_inactive = rgba(00000000)
    }
    
    blur {
        enabled = true
        size = 1
        passes = 5
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = winIn, 0.1, 1.0, 0.1, 1.0
    bezier = winOut, 0.1, 1.0, 0.1, 1.0
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = layerOut, 0.23, 1, 0.32, 1
    animation = windows, 1, 7, winIn, slide
    animation = windowsOut, 1, 3, smoothOut, slide
    animation = windowsMove, 1, 7, winIn, slide
    animation = workspaces, 1, 8, winIn, slide
    animation = workspacesOut, 1, 8, winOut, slide
    animation = layers, 1, 10, winIn, slide
    animation = layersOut, 1, 3, layerOut, popin 50%
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us,br
    kb_variant =
    kb_model =
    kb_options = grp:ctrl_space_toggle
    kb_rules =
    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0.8
    repeat_rate = 50        
    repeat_delay = 200  
    touchpad {
        natural_scroll = false
    }
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# windowrule = suppressevent maximize, match:class .*
# windowrule = nofocus, match:class ^$, match:title ^$, match:xwayland 1, match:floating 1, match:fullscreen 0, match:pinned 0
windowrule = float on, match:class ^(floating-cava)$
windowrule = size 800 400, match:class ^(floating-cava)$
# windowrule = center, match:class ^(floating-cava)$
windowrule = animation slide, match:class ^(floating-cava)$

# OpenRGB - Load profile at startup
exec-once = openrgb --startminimized --profile "/home/carl/.config/OpenRGB/dark_white.orp"

# Workspace 1: Firefox & Terminal
windowrule = workspace 1, match:class ^(firefox)$

# Workspace 2: Brave
windowrule = workspace 2, match:class ^(Brave-browser)$

# Workspace 3: Spotify, Telegram, WhatsApp
windowrule = workspace 3, match:class ^(Spotify)$
windowrule = workspace 3, match:class ^(telegram|Telegram)$
windowrule = workspace 3, match:class ^(wasistlos|whatsapp)$
windowrule = workspace 3 silent, match:class ^(Signal)$
windowrule = workspace 3 silent, match:title ^(Signal)$

# KiCad - disable all opacity effects
# windowrule = opaque, match:class ^(kicad)$
# windowrule = opaque, match:class ^(kicad-nightly)$

# Spotify music popup - floating and centered
windowrule = float on, match:title ^(🎵 Spotify)$
windowrule = size 380 400, match:title ^(🎵 Spotify)$
# windowrule = center, match:title ^(🎵 Spotify)$
windowrule = animation slide, match:title ^(🎵 Spotify)$
windowrule = pin on, match:title ^(🎵 Spotify)$
# windowrule = dimaround, match:title ^(🎵 Spotify)$

# YAD Calendar popup - floating and styled
windowrule = float on, match:title ^(📅 Calendar)$
windowrule = size 480 420, match:title ^(📅 Calendar)$
# windowrule = center, match:title ^(📅 Calendar)$
windowrule = animation slide, match:title ^(📅 Calendar)$
# windowrule = dimaround, match:title ^(📅 Calendar)$
windowrule = pin on, match:title ^(📅 Calendar)$

#############################
#######MISC##################
############################
# Enable lock on loginctl
exec-once = hyprlock --lock-on-signal

# Smart window movement between monitors
bind = SUPER, T, exec, ~/.config/hypr/scripts/move-to-monitor.sh toggle
bind = SUPER SHIFT, T, exec, ~/.config/hypr/scripts/move-to-monitor.sh secondary
bind = SUPER CTRL SHIFT, T, exec, ~/.config/hypr/scripts/move-to-monitor.sh primary

# Toggle BenQ monitor rotation
bind = SUPER SHIFT, R, exec, ~/.config/hypr/scripts/toggle-monitor-rotation.sh

# Volume controls with 100% cap (PipeWire/wpctl)
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh up
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-control.sh mute

# Cursor theme
env = XCURSOR_THEME,Breeze
env = XCURSOR_SIZE,24

# Hyprcursor (Hyprland's cursor system)
exec-once = hyprctl setcursor Breeze 24
